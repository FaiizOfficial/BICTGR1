<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitoring Foto Before-After & Brankas</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-blue: #005b9f;
      --secondary-blue: #00457c;
      --accent-yellow: #ffd600;
      --bg-color: #f0f2f5;
      --card-bg: #ffffff;
      --text-main: #2b2b2b;
      --border-color: #dee2e6;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 20px;
      color: var(--text-main);
    }

    .container {
      max-width: 1000px; /* Diperlebar sedikit karena kolom foto memakan tempat */
      margin: auto;
    }

    /* TOMBOL KEMBALI KE HOME */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary-blue);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 15px;
      background: white;
      padding: 10px 18px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 1px solid var(--border-color);
      transition: all 0.2s;
    }
    .back-btn:hover { background: var(--bg-color); transform: translateX(-3px); }

    .header-card {
      background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      color: white;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header-title h1 { margin: 0; font-size: 20px; }
    .header-title p { margin: 0; color: var(--accent-yellow); font-size: 13px; }

    /* Filter Menu */
    .filter-menu {
      background: rgba(255,255,255,0.1);
      padding: 10px 15px;
      border-radius: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .filter-menu select {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      font-family: 'Poppins', sans-serif;
      outline: none;
      cursor: pointer;
    }

    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      table-layout: auto;
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background-color: #f8f9fa;
      color: var(--primary-blue);
      font-weight: 600;
    }

    tr:hover { background-color: #f1f5f9; }

    /* STYLE UNTUK TOMBOL FOTO */
    .btn-photo {
      background: #e3f2fd;
      color: var(--primary-blue);
      padding: 6px 12px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: 0.2s;
      border: 1px solid #90caf9;
    }
    .btn-photo:hover {
      background: var(--primary-blue);
      color: white;
    }
    
    .badge-kosong {
      background: #ffebee;
      color: #c62828;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
      border: 1px solid #ffcdd2;
    }

    .loading { text-align: center; padding: 20px; color: var(--primary-blue); font-weight: 600; }

    @media (max-width: 768px) {
      body { padding: 10px; }
      .header-card { flex-direction: column; align-items: flex-start; }
      .filter-menu { width: 100%; justify-content: space-between; box-sizing: border-box; }
      .card { padding: 10px; }
      th, td { 
        padding: 8px 5px; 
        font-size: 11px; 
        line-height: 1.4;
      }
      .btn-photo, .badge-kosong {
        padding: 4px 6px;
        font-size: 10px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  
  <a href="index.html" class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Kembali ke Menu Utama
  </a>

  <div class="header-card">
    <div class="header-title" style="text-align: left;">
      <h1><i class="fa-solid fa-camera-retro"></i> Dashboard Laporan Foto</h1>
      <p>Monitoring Foto Before-After & Brankas Toko</p>
    </div>
    
    <div class="filter-menu">
      <label style="color:white; font-size: 14px;">Bulan:</label>
      <select id="bulanFilter" onchange="terapkanFilter()">
        <option value="1">Januari</option>
        <option value="2">Februari</option>
        <option value="3">Maret</option>
        <option value="4">April</option>
        <option value="5">Mei</option>
        <option value="6">Juni</option>
        <option value="7">Juli</option>
        <option value="8">Agustus</option>
        <option value="9">September</option>
        <option value="10">Oktober</option>
        <option value="11">November</option>
        <option value="12">Desember</option>
      </select>
      <select id="tahunFilter" onchange="terapkanFilter()"></select>
    </div>
  </div>

  <div class="card">
    <div id="loading" class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Mengambil data laporan foto...</div>
    <table id="tabelData" style="display: none;">
      <thead>
        <tr>
          <th>Tanggal</th>
          <th>Kode Toko</th>
          <th>PIC / Tim SO</th>
          <th>Foto Before</th>
          <th>Foto After</th>
          <th>Foto Brankas</th>
        </tr>
      </thead>
      <tbody id="isiTabel">
        </tbody>
    </table>
  </div>
</div>

<script>
  // PENTING: Ganti dengan URL Script Google yang mengarah ke database laporan foto jika berbeda
  const scriptURL = "https://script.google.com/macros/s/AKfycbyEQ0yzvK_CnzHaWFHSjh3w94Z1pg2lu_h-3_pZ2FTmmw3q914O6nwIUIu9vidcyimjmg/exec";
  
  let dataGlobal = [];
  let headerGlobal = [];

  window.onload = function() {
    setupFilterWaktu();
    fetchData();
  };

  function setupFilterWaktu() {
    const sekarang = new Date();
    document.getElementById("bulanFilter").value = sekarang.getMonth() + 1; 
    
    const thnSelect = document.getElementById("tahunFilter");
    const thnSekarang = sekarang.getFullYear();
    for(let i = thnSekarang - 1; i <= thnSekarang + 1; i++){
      let opt = document.createElement("option");
      opt.value = i; opt.text = i;
      if(i === thnSekarang) opt.selected = true;
      thnSelect.appendChild(opt);
    }
  }

  function fetchData() {
    fetch(scriptURL)
      .then(response => response.json())
      .then(data => {
        headerGlobal = data[0]; 
        dataGlobal = data.slice(1); 
        
        document.getElementById("loading").style.display = "none";
        document.getElementById("tabelData").style.display = "table";
        terapkanFilter(); 
      })
      .catch(error => {
        document.getElementById("loading").innerHTML = "Gagal memuat data. Pastikan Script sudah di-deploy ulang.";
      });
  }

  function cekTautanFoto(urlData) {
    if (urlData && urlData.trim() !== "" && (urlData.includes("http") || urlData.includes("drive.google"))) {
      return `<a href="${urlData}" target="_blank" class="btn-photo"><i class="fa-solid fa-image"></i> Lihat</a>`;
    } else {
      return `<span class="badge-kosong">Belum Ada</span>`;
    }
  }

  function terapkanFilter() {
    const blnPilih = parseInt(document.getElementById("bulanFilter").value);
    const thnPilih = parseInt(document.getElementById("tahunFilter").value);
    
    // Sesuaikan kata kunci di bawah ini dengan nama header asli di Google Sheet kamu!
    const idxTanggal = headerGlobal.findIndex(h => h.toLowerCase().includes("tanggal"));
    const idxToko = headerGlobal.findIndex(h => h.toLowerCase().includes("toko"));
    
    // Mencari header yang mengandung kata 'pic', 'officer', atau 'nama'
    const idxPIC = headerGlobal.findIndex(h => h.toLowerCase().includes("pic") || h.toLowerCase().includes("officer") || h.toLowerCase().includes("nama"));
    
    // Index untuk foto
    const idxBefore = headerGlobal.findIndex(h => h.toLowerCase().includes("before"));
    const idxAfter = headerGlobal.findIndex(h => h.toLowerCase().includes("after"));
    const idxBrankas = headerGlobal.findIndex(h => h.toLowerCase().includes("brankas"));

    let dataTerfilter = dataGlobal.filter(row => {
      let tglRow = new Date(row[idxTanggal]);
      if (isNaN(tglRow)) return false; 
      return (tglRow.getMonth() + 1 === blnPilih) && (tglRow.getFullYear() === thnPilih);
    });

    dataTerfilter.sort((a, b) => new Date(b[idxTanggal]) - new Date(a[idxTanggal]));

    renderTabel(dataTerfilter, idxTanggal, idxToko, idxPIC, idxBefore, idxAfter, idxBrankas);
  }

  function renderTabel(data, idxTanggal, idxToko, idxPIC, idxBefore, idxAfter, idxBrankas) {
    const tbody = document.getElementById("isiTabel");
    tbody.innerHTML = "";

    if(data.length === 0) {
      tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Belum ada laporan foto di bulan ini.</td></tr>";
      return;
    }

    data.forEach(row => {
      let tglAsli = new Date(row[idxTanggal]);
      let tglRapi = tglAsli.toLocaleDateString('id-ID', {day: '2-digit', month: 'short', year: 'numeric'});

      // Memproses tampilan kolom foto menggunakan fungsi cekTautanFoto()
      let fotoBefore = cekTautanFoto(idxBefore !== -1 ? row[idxBefore] : "");
      let fotoAfter = cekTautanFoto(idxAfter !== -1 ? row[idxAfter] : "");
      let fotoBrankas = cekTautanFoto(idxBrankas !== -1 ? row[idxBrankas] : "");

      let tr = document.createElement("tr");
      tr.innerHTML = `
        <td style="font-weight:600;">${tglRapi}</td>
        <td style="font-weight:700; color:var(--primary-blue);">${row[idxToko] || '-'}</td>
        <td>${idxPIC !== -1 ? (row[idxPIC] || '-') : '-'}</td>
        <td>${fotoBefore}</td>
        <td>${fotoAfter}</td>
        <td>${fotoBrankas}</td>
      `;
      tbody.appendChild(tr);
    });
  }
</script>
</body>
</html>
