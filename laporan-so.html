<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan SO Harian - Inventory Control</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <style>
    /* VARIABEL WARNA */
    :root {
      --primary-blue: #005b9f;
      --secondary-blue: #00457c;
      --accent-yellow: #ffd600;
      --accent-red: #e51d20;
      --bg-color: #f0f2f5;
      --card-bg: #ffffff;
      --text-main: #2b2b2b;
      --text-muted: #6c757d;
      --border-color: #dee2e6;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 15px;
      color: var(--text-main);
    }

    .container {
      max-width: 550px;
      margin: auto;
      animation: fadeIn 0.5s ease-in-out;
    }

    /* HEADER STYLE */
    .header-card {
      background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
      padding: 25px 20px;
      border-radius: 20px;
      text-align: center;
      color: white;
      box-shadow: 0 10px 20px rgba(0, 91, 159, 0.2);
      margin-bottom: 20px;
    }

    .header-card h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
    .header-card p { margin: 5px 0 0 0; font-size: 13px; color: var(--accent-yellow); font-weight: 600; }

    /* SECTION CARD */
    .form-section {
      background: var(--card-bg);
      padding: 25px 20px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      margin-bottom: 20px;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary-blue);
      margin-top: 0;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px dashed var(--border-color);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* INPUT STYLING */
    .input-group { margin-bottom: 18px; }
    label { font-weight: 600; font-size: 13px; margin-bottom: 8px; display: block; color: var(--text-main); }
    input, select, textarea {
      width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border-color);
      box-sizing: border-box; transition: all 0.3s; font-size: 14px; font-family: 'Poppins', sans-serif;
      background-color: #f8f9fa;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary-blue); box-shadow: 0 0 0 3px rgba(0, 91, 159, 0.1); outline: none; background-color: #fff;
    }
    input[readonly] {
      background-color: #e3f2fd; border: 1px dashed var(--primary-blue); color: var(--primary-blue);
      font-weight: 700; font-size: 16px; text-align: right;
    }
    textarea { resize: vertical; height: 80px; }

    /* RADIO BUTTON OPTION BOX */
    .option-box { display: flex; gap: 10px; margin-top: 5px; }
    .option-box input[type="radio"] { display: none; }
    .option {
      flex: 1; text-align: center; padding: 12px; border-radius: 12px; border: 2px solid var(--border-color);
      cursor: pointer; transition: 0.2s; font-weight: 600; font-size: 13px; background: #f8f9fa; color: var(--text-muted);
    }
    .option-box input[type="radio"]:checked + .option {
      background: var(--primary-blue); color: white; border-color: var(--primary-blue);
      box-shadow: 0 4px 10px rgba(0, 91, 159, 0.3);
    }

    /* TOMBOL SUBMIT */
    button[type="submit"] {
      width: 100%; padding: 16px; border: none; border-radius: 16px; background: var(--primary-blue);
      color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s;
      box-shadow: 0 8px 20px rgba(0, 91, 159, 0.3); font-family: 'Poppins', sans-serif; margin-bottom: 20px;
    }
    button[type="submit"]:hover { background: var(--secondary-blue); transform: translateY(-2px); }

    /* STATE SUKSES (BARU) */
    .success-container {
      background: #fff;
      padding: 40px 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      border: 2px solid #28a745;
      animation: fadeIn 0.5s ease-in-out;
      display: none; /* Disembunyikan awalnya */
    }
    .success-container i.icon-success {
      font-size: 60px; color: #28a745; margin-bottom: 15px;
    }
    .success-container h2 { color: #28a745; margin: 0 0 10px 0; font-size: 22px; }
    .success-container p { color: var(--text-muted); margin-bottom: 25px; font-size: 14px; }
    
    .action-buttons { display: flex; flex-direction: column; gap: 12px; }
    
    .btn-action {
      display: flex; justify-content: center; align-items: center; gap: 10px;
      padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 600; font-size: 14px;
      transition: all 0.3s; cursor: pointer; border: none; font-family: 'Poppins', sans-serif;
    }
    .btn-check { background: #e8f5e9; color: #2e7d32; border: 2px solid #c8e6c9; }
    .btn-check:hover { background: #c8e6c9; }
    .btn-home { background: var(--primary-blue); color: white; }
    .btn-home:hover { background: var(--secondary-blue); }
    .btn-reset { background: transparent; color: var(--text-muted); font-size: 13px; text-decoration: underline; margin-top: 5px; }
    .btn-reset:hover { color: var(--text-main); }

    /* FOOTER */
    .cek-btn {
      display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; box-sizing: border-box;
      padding: 14px; background: #fff; color: var(--primary-blue); border-radius: 16px; font-weight: 700;
      text-decoration: none; border: 2px solid var(--primary-blue); font-size: 15px; margin-bottom: 20px;
    }
    .social { display: flex; justify-content: center; gap: 25px; margin-top: 10px; padding-bottom: 30px; }
    .social a { text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; }

    /* ERROR MESSAGES */
    .error { color: var(--accent-red); font-size: 12px; margin-top: 5px; font-weight: 600; }
    .input-error { border: 2px solid var(--accent-red) !important; background-color: #fff5f5 !important; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .select2-container--default .select2-selection--single { height: 46px; border-radius: 12px; border: 1px solid var(--border-color); background-color: #f8f9fa; }
    .select2-container--default .select2-selection--single .select2-selection__rendered { line-height: 46px; font-family: 'Poppins', sans-serif; font-size: 14px; padding-left: 15px; }
    .select2-container--default .select2-selection--single .select2-selection__arrow { height: 44px; }
  </style>
</head>
<body>

<div class="container">
  
  <div class="header-card">
    <h1>LAPORAN SO HARIAN</h1>
    <p>INVENTORY CONTROL TANGERANG 1</p>
  </div>

  <div class="success-container" id="successContainer">
    <i class="fa-solid fa-circle-check icon-success"></i>
    <h2>Laporan Terkirim!</h2>
    <p>Data SO Harian berhasil masuk ke dalam sistem Spreadsheet.</p>
    
    <div class="action-buttons">
      <a href="https://docs.google.com/spreadsheets/d/1--15lTnPMyNCLs7S2svKHWqvjzzfl5FavUs5lLoi88w/edit?usp=drivesdk" target="_blank" class="btn-action btn-check">
        <i class="fa-solid fa-table-list"></i> Cek Laporan di Spreadsheet
      </a>
      
      <a href="index.html" class="btn-action btn-home">
        <i class="fa-solid fa-house"></i> Kembali ke Menu Utama
      </a>

      <button type="button" class="btn-action btn-reset" onclick="resetForm()">
        <i class="fa-solid fa-rotate-right"></i> Input laporan toko lain
      </button>
    </div>
  </div>

  <form id="soForm">

    <div class="form-section">
      <h3 class="section-title"><i class="fa-solid fa-store"></i> Data Toko & Tim</h3>
      <div class="input-group">
        <label>KODE TOKO</label>
        <select name="kode_toko" id="kode_toko" required>
          <option value="TU4R - A Yani Tangerang">TU4R - A Yani Tangerang</option>
          <option value="T2IO - Wisma Mas">T2IO - Wisma Mas</option>
          <option value="T72C - World Of Wonder">T72C - World Of Wonder</option>
        </select>
      </div>
      <div class="input-group">
        <label>TANGGAL SO</label>
        <input type="date" name="tanggal" required>
      </div>
      <div class="input-group">
        <label>OFFICER</label>
        <select name="officer" required>
          <option value="">-- Pilih Officer --</option>
          <option>BASMAN HAFIZ</option>
          <option>DEDE ROMANSYAH</option>
          <option>MARJUKI</option>
          <option>RIZKI DWI PUTRA</option>
          <option>SANTO SATRIADI</option>
          <option>SUHERI</option>
          <option>YADI JUPRIADI</option>
        </select>
      </div>
      <div class="input-group">
        <label>KOORDINATOR</label>
        <select name="koordinator" required>
          <option value="">-- Pilih Koordinator --</option>
          <option>HERU PRIYANTO</option>
          <option>VIKHI NOVIAN SHIA</option>
          <option>SAEFUL BAHRI</option>
          <option>SYARIFUDIN</option>
          <option>AHMAD SOLIHIN</option>
          <option>SAIFUL ANWAR</option>
          <option>WAHONO</option>
          <option>ALFI EKA PUTRA SAKTI</option>
          <option>FEBRIANSYAH</option>
          <option>DADAN RAMDANI</option>
          <option>M BAHRULI SURYADI</option>
          <option>ANDRIAN ADITYA</option>
          <option>ADI SURYADI</option>
          <option>M NASRUL NAPIUDIN</option>
          <option>EXTRA</option>
        </select>
      </div>
    </div>

    <div class="form-section">
      <h3 class="section-title"><i class="fa-solid fa-network-wired"></i> Kondisi Area & Jaringan</h3>
      <div class="input-group">
        <label>KONDISI DISPLAY</label>
        <div class="option-box">
          <input type="radio" id="display_rapih" name="display" value="Rapih" required>
          <label for="display_rapih" class="option">Rapih</label>
          <input type="radio" id="display_tidak" name="display" value="Tidak Rapih" required>
          <label for="display_tidak" class="option">Tidak Rapih</label>
        </div>
      </div>
      <div class="input-group">
        <label>KONDISI GUDANG</label>
        <div class="option-box">
          <input type="radio" id="gudang_rapih" name="gudang" value="Rapih" required>
          <label for="gudang_rapih" class="option">Rapih</label>
          <input type="radio" id="gudang_tidak" name="gudang" value="Tidak Rapih" required>
          <label for="gudang_tidak" class="option">Tidak Rapih</label>
        </div>
      </div>
      <div class="input-group">
        <label>KONDISI ROUTER</label>
        <select name="kondisi_router" required>
          <option value="">-- Pilih Kondisi --</option>
          <option>Tidak ada Kendala</option>
          <option>Koneksi Lemot</option>
          <option>Koneksi gudang lemot</option>
          <option>Komputer lemot</option>
          <option>Koneksi tidak sampai gudang</option>
          <option>Router rusak/tidak ada</option>
          <option>Kabel Hub rusak</option>
        </select>
      </div>
      <div class="input-group">
        <label>POSISI ROUTER</label>
        <select name="posisi_router" required>
          <option value="">-- Pilih Posisi --</option>
          <option>Pintu Gudang</option>
          <option>Kasiran</option>
        </select>
      </div>
      <div class="input-group">
        <label>PENEMPATAN ROUTER</label>
        <select name="penempatan_router" required>
          <option value="">-- Pilih Lantai --</option>
          <option>Lantai 1</option>
          <option>Lantai 2</option>
          <option>Lantai 3</option>
        </select>
      </div>
    </div>

    <div class="form-section">
      <h3 class="section-title"><i class="fa-solid fa-boxes-stacked"></i> Nilai SO</h3>
      <div class="input-group">
        <label>NILAI KURANG (NK)</label>
        <input type="number" name="nilai_kurang" placeholder="0" required>
      </div>
      <div class="input-group">
        <label>NILAI LEBIH (NL)</label>
        <input type="number" name="nilai_lebih" placeholder="0" required>
      </div>
      <div class="input-group">
        <label>NILAI KURANG LEBIH (NKL)</label>
        <input type="number" id="nkl_so" name="nkl_so" placeholder="0" readonly>
      </div>
      <div class="input-group">
        <label>KETERANGAN NKL SO</label>
        <textarea name="keterangan" placeholder="Masukkan keterangan..." required></textarea>
      </div>
    </div>

    <div class="form-section">
      <h3 class="section-title"><i class="fa-solid fa-wallet"></i> Laporan Kas & Keuangan</h3>
      <div class="input-group"><label>FISIK UANG</label><input type="number" name="fisik_uang" placeholder="0" required></div>
      <div class="input-group"><label>MODAL INDUK</label><input type="number" name="modal_induk" placeholder="0" required></div>
      <div class="input-group"><label>MODAL ANAK</label><input type="number" name="modal_anak" placeholder="0" required></div>
      <div class="input-group"><label>MODAL POINT COFFEE</label><input type="number" name="modal_pc" placeholder="0" required></div>
      <div class="input-group"><label>TOTAL DANA SALES</label><input type="number" id="dana_sales" placeholder="0" readonly></div>
      <div class="input-group"><label>UANG SALES</label><input type="number" name="sales" placeholder="0" required></div>
      <div class="input-group"><label>KAS TOKO</label><input type="number" name="kas_toko" placeholder="0" required></div>
      <div class="input-group"><label>TOTAL DANA KAS</label><input type="number" id="dana_kas" placeholder="0" readonly></div>
      <div class="input-group"><label>PERSONIL</label><input type="number" name="personil" placeholder="0" required></div>
      <div class="input-group"><label>BON RRAK</label><input type="number" name="bon" placeholder="0" required></div>
      <div class="input-group"><label>VARIANCE</label><input type="number" name="variance" placeholder="0" required></div>
      <div class="input-group"><label>TUKAR DC</label><input type="number" name="tukar_dc" placeholder="0" required></div>
      <div class="input-group"><label>LAIN LAIN</label><input type="number" name="lain_lain" placeholder="0" required></div>
      <div class="input-group" style="margin-top: 25px;">
        <label style="font-size: 15px; color: var(--primary-blue);">GRAND TOTAL</label>
        <input type="number" id="grand_total" placeholder="0" style="font-size: 20px;" readonly>
      </div>
    </div>

    <button type="submit">
      <i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i> KIRIM LAPORAN SO
    </button>

  </form>

  <div class="social">
    <a href="https://instagram.com/faiizhsn" target="_blank"><i class="fa-brands fa-instagram"></i> faiizhsn</a>
    <a href="https://wa.me/6285719289642" target="_blank"><i class="fa-brands fa-whatsapp"></i> Mued Ganzz</a>
  </div>

</div>

<script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbyEQ0yzvK_CnzHaWFHSjh3w94Z1pg2lu_h-3_pZ2FTmmw3q914O6nwIUIu9vidcyimjmg/exec";
  const form = document.getElementById("soForm");
  const successContainer = document.getElementById("successContainer");

  form.addEventListener("submit", function(e) {
  e.preventDefault();
  let valid = true;

  document.querySelectorAll(".error").forEach(el => el.remove());
  document.querySelectorAll(".input-error").forEach(el => el.classList.remove("input-error"));

  const requiredFields = form.querySelectorAll("[required]");

  requiredFields.forEach(field => {
    if (field.type === "radio") {
      const checked = form.querySelector(`input[name="${field.name}"]:checked`);
      if (!checked) {
        valid = false;
        showError(field.closest(".option-box"));
      }
    } 
    else if (!field.value) {
      valid = false;
      field.classList.add("input-error");
      showError(field);
    }
  });

  if (!valid) {
    document.querySelector('.error').scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  // Efek Loading
  const btnSubmit = form.querySelector('button[type="submit"]');
  const originalBtnText = btnSubmit.innerHTML;
  btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> MENGIRIM...';
  btnSubmit.disabled = true;

  fetch(scriptURL, { method: "POST", body: new FormData(form)})
    .then(() => {
      // 1. Sembunyikan Form
      form.style.display = "none";
      
      // 2. Tampilkan Kotak Sukses
      successContainer.style.display = "block";
      
      // 3. Scroll ke atas biar user langsung lihat
      window.scrollTo({ top: 0, behavior: 'smooth' });
      
      // Reset text tombol buat jaga-jaga kalau dia mau input lagi
      btnSubmit.innerHTML = originalBtnText;
      btnSubmit.disabled = false;
    })
    .catch(() => {
      alert("Gagal kirim data. Pastikan koneksi internet stabil.");
      btnSubmit.innerHTML = originalBtnText;
      btnSubmit.disabled = false;
    });
});

// Fungsi untuk mereset form jika user klik "Input Laporan Toko Lain"
function resetForm() {
    form.reset();
    $('#kode_toko').val(null).trigger('change'); // Reset pencarian Select2
    successContainer.style.display = "none";
    form.style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showError(element) {
  const error = document.createElement("div");
  error.className = "error";
  error.innerText = "Wajib diisi!";
  element.after(error);
}

  function hitungSemua() {
  const fisik = Number(document.querySelector('[name="fisik_uang"]').value) || 0;
  const modalInduk = Number(document.querySelector('[name="modal_induk"]').value) || 0;
  const modalAnak = Number(document.querySelector('[name="modal_anak"]').value) || 0;
  const modalPC = Number(document.querySelector('[name="modal_pc"]').value) || 0;
  const sales = Number(document.querySelector('[name="sales"]').value) || 0;
  const kasToko = Number(document.querySelector('[name="kas_toko"]').value) || 0;
  const personil = Number(document.querySelector('[name="personil"]').value) || 0;
  const bon = Number(document.querySelector('[name="bon"]').value) || 0;
  const variance = Number(document.querySelector('[name="variance"]').value) || 0;
  const tukarDC = Number(document.querySelector('[name="tukar_dc"]').value) || 0;
  const lainlain = Number(document.querySelector('[name="lain_lain"]').value) || 0;

  const danaSales = fisik + modalInduk + modalAnak + modalPC;
  document.getElementById("dana_sales").value = danaSales;

  const danaKas = sales + kasToko;
  document.getElementById("dana_kas").value = danaKas;

  const grandTotal = danaSales - danaKas + personil + bon + variance + tukarDC + lainlain;
  document.getElementById("grand_total").value = grandTotal;
}

document.querySelectorAll('input[type="number"]').forEach(input => {
  input.addEventListener("input", hitungSemua);
});

$(document).ready(function() {
    $('#kode_toko').select2({ placeholder: "Cari Kode / Nama Toko", width: '100%' });
});

const nkInput = document.querySelector('input[name="nilai_kurang"]');
const nlInput = document.querySelector('input[name="nilai_lebih"]');
const nklSoInput = document.querySelector('input[name="nkl_so"]');

function hitungNKLSO() {
    let nk = parseFloat(nkInput.value) || 0;
    let nl = parseFloat(nlInput.value) || 0;
    nklSoInput.value = nk + nl;
}

nkInput.addEventListener("input", hitungNKLSO);
nlInput.addEventListener("input", hitungNKLSO);
</script>
</body>
</html>
